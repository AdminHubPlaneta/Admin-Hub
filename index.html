<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Hub - Gemini Integration</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap {
  background: #020B18; border-radius: 20px; overflow: hidden;
  position: relative; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 740px; display: flex; flex-direction: column;
}
.bg-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.topbar {
  position: relative; z-index: 20; padding: 22px 28px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-sq {
  width: 40px; height: 40px; border-radius: 11px; background: #003A5C;
  border: 1px solid rgba(0,230,255,0.4);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { color: #fff; font-size: 17px; font-weight: 500; letter-spacing: -0.02em; }
.brand-dept { color: rgba(0,230,255,0.38); font-size: 11px; margin-top: 2px; letter-spacing: 0.03em; }

/* AI AGENT BADGE - AHORA COMO ENLACE */
.ai-badge {
  display: flex; align-items: center; gap: 7px;
  background: rgba(0,90,130,0.15);
  border: 1px solid rgba(0,230,255,0.25);
  border-radius: 10px;
  padding: 5px 10px 5px 6px;
  text-decoration: none; /* Quitar subrayado */
  position: absolute;
  bottom: 12px;
  right: 14px;
  z-index: 50;
  transition: all 0.3s ease;
}
.ai-badge:hover {
  background: rgba(0,230,255,0.1);
  border-color: rgba(0,230,255,0.6);
  transform: translateY(-2px);
}
.ai-orb {
  width: 30px; height: 30px; border-radius: 50%;
  background: #001828;
  border: 1px solid rgba(0,230,255,0.45);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative;
}
.ai-orb-ring {
  position: absolute; width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(0,230,255,0.15);
  animation: ai-pulse 2.5s ease-in-out infinite;
}
@keyframes ai-pulse { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.7;transform:scale(1.06);} }
.ai-texts { display: flex; flex-direction: column; gap: 1px; }
.ai-status { display: flex; align-items: center; gap: 4px; }
.ai-dot {
  width: 4px; height: 4px; border-radius: 50%; background: #00E6FF;
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
.ai-status-text { color: rgba(0,230,255,0.5); font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; }
.ai-name { color: rgba(0,230,255,0.9); font-size: 11px; font-weight: 500; letter-spacing: -0.01em; }

.scene {
  flex: 1; position: relative; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  padding: 20px 20px 0; min-height: 560px;
}
.orbit-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4; }
.hub {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 114px; height: 114px; border-radius: 50%;
  background: rgba(1,10,22,0.92); border: 2px solid rgba(0,230,255,0.6);
  display: flex; align-items: center; justify-content: center; z-index: 30;
}
.hp { position: absolute; border-radius: 50%; border: 1px solid rgba(0,230,255,0.15); animation: pulsar 3s ease-in-out infinite; }
@keyframes pulsar { 0%,100%{opacity:.2;transform:scale(1);} 50%{opacity:.9;transform:scale(1.07);} }
.node {
  position: absolute; transform: translate(-50%,-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; z-index: 20;
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.node:hover { transform: translate(-50%,-50%) scale(1.14); }
.bubble { border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid rgba(0,230,255,0.15); transition: border-color 0.2s; }
.node:hover .bubble { border-color: rgba(0,230,255,0.65); }
.node-label { font-size: 12px; font-weight: 500; color: rgba(0,200,230,0.45); text-align: center; line-height: 1.2; max-width: 80px; transition: color 0.2s; }
.node:hover .node-label { color: #00E6FF; }
.detail {
  position: relative; z-index: 20; display: flex; align-items: center; gap: 18px;
  padding: 0 28px; min-height: 96px;
  border-top: 1px solid rgba(0,230,255,0.1);
  background: rgba(0,6,18,0.75); transition: opacity 0.25s;
}
.detail.off { opacity: 0; pointer-events: none; }
.d-orb { width: 54px; height: 54px; border-radius: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0,230,255,0.2); }
.d-title { color: #E0F7FF; font-size: 19px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 3px; }
.d-desc  { color: rgba(0,200,230,0.42); font-size: 12px; line-height: 1.5; max-width: 450px; }
.d-cta { flex-shrink: 0; margin-left: auto; padding: 11px 22px; border-radius: 10px; background: transparent; border: 1.5px solid rgba(0,230,255,0.5); color: #00E6FF; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background .15s, border-color .15s; }
.d-cta:hover { background: rgba(0,230,255,0.1); border-color: #00E6FF; }
.hint { position: absolute; bottom: 108px; left: 50%; transform: translateX(-50%); color: rgba(0,230,255,0.13); font-size: 11px; letter-spacing: .1em; pointer-events: none; z-index: 6; white-space: nowrap; }
@keyframes spin-cw  { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes spin-ccw { from{transform:rotate(0)} to{transform:rotate(-360deg)} }
.rcw  { animation: spin-cw   80s linear infinite; transform-origin: 350px 265px; }
.rccw { animation: spin-ccw 120s linear infinite; transform-origin: 350px 265px; }
@keyframes scan { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }
.scanner { animation: scan 8s linear infinite; transform-origin: 350px 265px; }
</style>
</head>
<body>

<div class="wrap" id="app">
  <canvas class="bg-canvas" id="bgc"></canvas>

  <div class="topbar">
    <div class="brand">
      <div class="brand-sq">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="2" width="7" height="7" rx="1.5" fill="#00E6FF"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5" fill="#00E6FF"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5" fill="#00E6FF"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5" fill="rgba(0,230,255,0.28)"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Admin Hub</div>
        <div class="brand-dept">Gestión Cobros</div>
      </div>
    </div>
  </div>

  <div class="scene" id="scene">
    <svg class="orbit-svg" viewBox="0 0 700 530" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="cg" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(0,200,255,0.13)"/>
          <stop offset="55%" stop-color="rgba(0,80,160,0.04)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(0,230,255,0.18)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
      </defs>
      <circle cx="350" cy="265" r="300" fill="url(#cg)"/>
      <circle cx="350" cy="265" r="160" fill="url(#bg2)"/>
      <polyline points="350,265 420,265 420,180 480,180" fill="none" stroke="rgba(0,180,255,0.18)" stroke-width="1.2"/>
      <polyline points="350,265 460,265 460,320 530,320" fill="none" stroke="rgba(0,180,255,0.15)" stroke-width="1.2"/>
      <polyline points="350,265 280,265 280,180 220,180" fill="none" stroke="rgba(0,180,255,0.18)" stroke-width="1.2"/>
      <polyline points="350,265 240,265 240,320 170,320" fill="none" stroke="rgba(0,180,255,0.15)" stroke-width="1.2"/>
      <circle class="rcw"  cx="350" cy="265" r="132" fill="none" stroke="rgba(0,230,255,0.1)" stroke-width="1"/>
      <circle class="rccw" cx="350" cy="265" r="215" fill="none" stroke="rgba(0,180,255,0.05)" stroke-width="1" stroke-dasharray="2 14"/>
      <line class="scanner" x1="350" y1="265" x2="350" y2="133" stroke="rgba(0,230,255,0.25)" stroke-width="1.5"/>
      <circle class="scanner" cx="350" cy="133" r="3" fill="rgba(0,230,255,0.55)"/>
    </svg>

    <a href="https://gemini.google.com/" target="_blank" class="ai-badge" id="ai-link">
      <div class="ai-orb">
        <div class="ai-orb-ring"></div>
        <svg width="22" height="22" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g transform="scale(0.85 0.85) translate(8 10)"> 
            <path d="M10 20C10 20 25 5 45 15C55 20 60 35 60 50C60 65 55 80 45 85C35 90 20 85 15 75C10 65 10 50 10 50" fill="none" stroke="#22D3EE" stroke-width="2"/>
            <path d="M50 15L55 10H65M60 25L65 20M55 40L65 35M60 55L65 50" stroke="#22D3EE" stroke-width="2" stroke-linecap="round"/>
            <circle cx="40" cy="50" r="5" fill="#22D3EE"/>
            <circle cx="68" cy="10" r="1.5" fill="#22D3EE"/>
            <circle cx="68" cy="35" r="1.5" fill="#22D3EE"/>
          </g>
        </svg>
      </div>
      <div class="ai-texts">
        <div class="ai-status">
          <div class="ai-dot"></div>
          <span class="ai-status-text">Agente activo</span>
        </div>
        <span class="ai-name">AITOR (Abrir Gemini)</span>
      </div>
    </a>

    <div class="hub">
      <div class="hp" style="width:138px;height:138px;"></div>
      <div class="hp" style="width:164px;height:164px;animation-delay:.9s;"></div>
      <svg width="78" height="78" viewBox="0 0 78 78" fill="none">
        <circle cx="39" cy="39" r="37" stroke="#00E6FF" stroke-width="1.5" fill="none" opacity="0.7"/>
        <circle cx="39" cy="39" r="16" fill="#021A30" stroke="#00E6FF" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="node" style="left:50%;top:16.5%;" data-k="reportes">
      <div class="bubble" style="width:76px;height:76px;background:rgba(0,22,42,0.92);">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none"><path d="M3 26l7-10 6 5 6-11 6 7" stroke="#00E6FF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="node-label">Reportes</span>
    </div>
    <div class="node" style="left:79.5%;top:30%;" data-k="cobros">
      <div class="bubble" style="width:76px;height:76px;background:rgba(0,26,36,0.92);">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="11" stroke="#00CFCF" stroke-width="1.7"/><path d="M15 10v5.5l4 2.5" stroke="#00CFCF" stroke-width="1.7" stroke-linecap="round"/></svg>
      </div>
      <span class="node-label">Cobros</span>
    </div>
    <div class="node" style="left:79.5%;top:70%;" data-k="check">
      <div class="bubble" style="width:76px;height:76px;background:rgba(0,26,46,0.92);">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none"><rect x="3" y="3" width="24" height="24" rx="4" stroke="#00E6FF" stroke-width="1.7"/><path d="M8 15l5 5 9-9" stroke="#00E6FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="node-label">Check</span>
    </div>
    <div class="node" style="left:50%;top:83.5%;" data-k="seguimientos">
      <div class="bubble" style="width:76px;height:76px;background:rgba(0,18,40,0.92);">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none"><circle cx="15" cy="11" r="5.5" stroke="#5DADE2" stroke-width="1.7"/><path d="M4 27c0-6.075 4.925-11 11-11s11 4.925 11 11" stroke="#5DADE2" stroke-width="1.7" stroke-linecap="round"/></svg>
      </div>
      <span class="node-label">Seguimientos</span>
    </div>

    <div class="hint" id="hint">toca una herramienta</div>
  </div>

  <div class="detail off" id="panel">
    <div class="d-orb" id="d-orb"></div>
    <div>
      <div class="d-title" id="d-title"></div>
      <div class="d-desc"  id="d-desc"></div>
    </div>
    <button class="d-cta" id="d-cta">Preguntar a Gemini →</button>
  </div>
</div>

<script>
// Base de datos de herramientas
const D = {
  reportes: { label:"Reportes", desc:"Analítica operativa y financiera. Haz clic para preguntar a Gemini sobre informes.", prompt:"Dime cómo puedo mejorar los reportes de gestión de cobros.", ic:"#00E6FF" },
  cobros: { label:"Cobros", desc:"Ciclo completo de cobro. Pregunta a Gemini sobre estrategias de pipeline.", prompt:"Dame estrategias efectivas para el seguimiento de cobros pendientes.", ic:"#00CFCF" },
  check: { label:"Check", desc:"Validación y verificación. Gemini te ayuda con el control de calidad.", prompt:"¿Qué puntos clave debo revisar en una auditoría de calidad de administración?", ic:"#00E6FF" },
  seguimientos: { label:"Seguimientos", desc:"Histórico de clientes. Consulta a la IA sobre gestión de expedientes.", prompt:"Redacta un correo amable pero firme para el seguimiento de un cliente con retraso.", ic:"#5DADE2" }
};

// Función para abrir Gemini con un texto predefinido
function preguntarGemini(texto) {
    const url = `https://gemini.google.com/app?q=${encodeURIComponent(texto)}`;
    window.open(url, '_blank');
}

// Gestión de clics en los nodos
document.querySelectorAll('.node').forEach(n => {
  n.addEventListener('click', () => {
    const k = n.dataset.k, d = D[k];
    if (!d) return;
    document.getElementById('hint').style.display = 'none';
    const panel = document.getElementById('panel');
    panel.classList.remove('off');
    
    document.getElementById('d-title').textContent = d.label;
    document.getElementById('d-desc').textContent = d.desc;
    
    // Al pulsar el botón del panel, abre Gemini con el prompt específico
    document.getElementById('d-cta').onclick = () => preguntarGemini(d.prompt);
  });
});

// Cerrar panel si se pulsa fuera
document.getElementById('scene').addEventListener('click', e => {
  if (!e.target.closest('.node') && !e.target.closest('#ai-link')) {
      document.getElementById('panel').classList.add('off');
  }
});

// Canvas Background (Simplified)
const cv = document.getElementById('bgc');
const ctx = cv.getContext('2d');
function drawBg() {
  cv.width = cv.offsetWidth; cv.height = cv.offsetHeight;
  ctx.fillStyle = 'rgba(0,160,220,0.05)';
  for(let x=0;x<cv.width;x+=40){
    for(let y=0;y<cv.height;y+=40){
      ctx.beginPath();ctx.arc(x,y,0.5,0,Math.PI*2);ctx.fill();
    }
  }
}
drawBg();
window.addEventListener('resize', drawBg);
</script>

</body>
</html>
