<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Hub — Convo '27</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --neon: #00D4F0; --bg: #041C2E; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            color: #E0F7FF; 
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Capas de fondo */
        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0,60,110,0.4) 0%, #041C2E 100%);
            z-index: -1;
        }

        /* Topbar */
        .header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 212, 240, 0.1);
        }

        /* Contenido Principal */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .title-section { text-align: center; margin-bottom: 40px; }
        .title-section h1 { font-size: 2.5rem; letter-spacing: -1px; }
        .title-section p { color: var(--neon); opacity: 0.6; font-size: 0.9rem; }

        /* Nodo Central */
        .drop-zone {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 212, 240, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            padding: 20px;
        }

        .drop-zone:hover {
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 212, 240, 0.2);
            transform: scale(1.05);
        }

        .drop-zone span {
            font-size: 0.85rem;
            margin-top: 10px;
            color: var(--neon);
        }

        /* Grid de Marcas */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 180px);
            gap: 15px;
            margin-top: 60px;
            padding-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 240, 0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
        }

        .obs { border-left: 4px solid #1dcc84; color: #1dcc84; }
        .inesdi { border-left: 4px solid #a878f0; color: #a878f0; }
        .esdesign { border-left: 4px solid #f0a830; color: #f0a830; }
        .ucma { border-left: 4px solid #3aabf0; color: #3aabf0; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="header">
        <div><strong>Admin Hub</strong> / Gestión Cobros</div>
        <div style="font-size: 0.8rem; color: var(--neon)">SYS v1.3</div>
    </div>

    <div class="main">
        <div class="title-section">
            <h1>Convo '27</h1>
            <p>Filtro: ID OPORTUNIDAD, ID NACS, NOMBRES, APELLIDOS</p>
        </div>

        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#a878f0" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span id="label">Herramienta Check</span>
            <input type="file" id="file-input" style="display:none" accept=".xlsx">
        </div>

        <div class="grid">
            <div class="card obs">OBS</div>
            <div class="card inesdi">INESDI</div>
            <div class="card esdesign">ESDESIGN</div>
            <div class="card ucma">UCMA</div>
        </div>
    </div>

    <script>
        const COLUMNAS_BUSCADAS = ["ID OPORTUNIDAD", "ID NACS", "NOMBRES", "APELLIDOS"];

        async function procesar(file) {
            if (!file) return;
            const label = document.getElementById('label');
            label.innerText = "Procesando...";

            try {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const workbook = new ExcelJS.Workbook();
                    await workbook.xlsx.load(e.target.result);
                    const ws = workbook.worksheets[0];
                    const regex = /[A-ZÁÉÍÓÚ]/;

                    // 1. Detectar columnas
                    let indices = [];
                    ws.getRow(1).eachCell((cell, colNum) => {
                        const val = cell.value?.toString().trim().toUpperCase();
                        if (COLUMNAS_BUSCADAS.includes(val)) indices.push(colNum);
                    });

                    // 2. Pintar celdas (Sin bordes para evitar errores de Excel)
                    ws.eachRow((row, rowNum) => {
                        if (rowNum === 1) return;
                        indices.forEach(idx => {
                            const cell = row.getCell(idx);
                            const text = cell.value ? String(cell.value).trim() : "";
                            if (regex.test(text)) {
                                cell.fill = {
                                    type: 'pattern',
                                    pattern: 'solid',
                                    fgColor: { argb: 'FFFFFF00' }
                                };
                            }
                        });
                    });

                    // 3. Descarga
                    const buffer = await workbook.xlsx.writeBuffer();
                    saveAs(new Blob([buffer]), "REVISADO_" + file.name);
                    label.innerText = "¡Hecho!";
                    setTimeout(() => label.innerText = "Herramienta Check", 3000);
                };
                reader.readAsArrayBuffer(file);
            } catch (err) {
                console.error(err);
                label.innerText = "Error";
            }
        }

        // Eventos
        document.getElementById('file-input').onchange = (e) => procesar(e.target.files[0]);
