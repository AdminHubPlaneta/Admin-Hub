<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Hub — Convo '27</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
/* Estilos visuales del Hub */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #041C2E; font-family: sans-serif; color: #E0F7FF; min-height: 100vh; overflow-x: hidden; }
.bg-overlay { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at center, rgba(0,60,110,0.4) 0%, #041C2E 100%); }
.topbar { position:relative; z-index:10; padding:20px 28px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(0,212,240,0.1); }
.brand-name { color:#fff; font-size:17px; font-weight:500; }
.back-btn { background:rgba(0,90,130,0.15); border:1px solid rgba(0,212,240,0.25); border-radius:8px; padding:7px 14px; color:#00D4F0; font-size:12px; cursor:pointer; text-decoration:none; }
.page-head { position:relative; z-index:10; padding:40px 20px; text-align:center; }
.page-title { font-size:28px; font-weight:600; color:#E0F7FF; margin-bottom: 8px;}
.page-sub { color:rgba(0,200,230,0.5); font-size:13px; }
.nodes-area { position:relative; z-index:10; display:flex; justify-content:center; padding:40px; }
.node { display:flex; flex-direction:column; align-items:center; gap:15px; cursor:pointer; }
.bubble { width:120px; height:120px; border-radius:50%; background:rgba(3,10,20,0.9); border:2px solid rgba(0,212,240,0.3); display:flex; align-items:center; justify-content:center; transition: all 0.3s; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.node:hover .bubble { border-color:#00D4F0; transform: scale(1.05); box-shadow: 0 0 30px rgba(0,212,240,0.2); }
.node-label { font-size:14px; color:#00D4F0; font-weight:500; }
</style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="topbar">
  <div class="brand-name">Admin Hub / Gestión Cobros</div>
  <a href="#" class="back-btn">Volver al Hub</a>
</div>

<div class="page-head">
  <div class="page-title">Convo '27</div>
  <div class="page-sub">Revisiones: ID OPORTUNIDAD, ID NACS, NOMBRES, APELLIDOS</div>
</div>

<div class="nodes-area">
  <div class="node" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="bubble" id="bubble-check">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#a878f0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <span class="node-label" id="check-label">Subir o Arrastrar Excel</span>
    <input type="file" id="file-input" style="display:none" accept=".xlsx">
  </div>
</div>

<script>
const COLUMNAS_DIANA = ["ID OPORTUNIDAD", "ID NACS", "NOMBRES", "APELLIDOS"];

async function handleFile(file) {
    if (!file) return;
    document.getElementById('check-label').innerText = "Procesando...";
    
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(e.target.result);
            const worksheet = workbook.worksheets[0];
            
            // Expresión regular: Mayúsculas o Tildes
            const regexMayusTildes = /[A-ZÁÉÍÓÚ]/;

            // Localizar columnas
            let colMap = [];
            const firstRow = worksheet.getRow(1);
            firstRow.eachCell((cell, colNumber) => {
                const headerText = cell.value?.toString().trim().toUpperCase();
                if (COLUMNAS_DIANA.includes(headerText)) {
                    colMap.push(colNumber);
                }
            });

            if (colMap.length === 0) {
                alert("No se detectaron las columnas necesarias.");
                return;
            }

            // Procesar datos
            worksheet.eachRow((row, rowNumber) => {
                if (rowNumber === 1) return; // Saltamos cabecera

                colMap.forEach(colIndex => {
                    const cell = row.getCell(colIndex);
                    const val = cell.value ? String(cell.value).trim() : "";
                    
                    if (regexMayusTildes.test(val)) {
                        // Aplicamos el formato de forma más sencilla para evitar errores de Excel
                        cell.fill = {
                            type: 'pattern',
                            pattern: 'solid',
                            fgColor: { argb: 'FFFFFF00' } // Amarillo estándar
                        };
                    }
                });
            });

            // Generar archivo
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
            saveAs(blob, "REVISADO_" + file.name);
            document.getElementById('check-label').innerText = "¡Completado!";

        } catch (err) {
            console.error(err);
            alert("Hubo un error al procesar el archivo.");
        } finally {
            setTimeout(() => { document.getElementById('check-label').innerText = "Subir o Arrastrar Excel"; }, 3000);
        }
    };
    reader.readAsArrayBuffer(file);
}

document.getElementById('file-input').addEventListener('change', (e) => handleFile(e.target.files[0]));

// Drag & Drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', (e) => { e.preventDefault(); });
dz.addEventListener('drop', (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
</script>
</body>
</html>
